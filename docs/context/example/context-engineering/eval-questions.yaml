# Context engineering self-evaluation

meta:
  version: "1.0"
  total_questions: 20
  passing_threshold: 16
  scoring:
    pass: 1.0
    partial: 0.5
    fail: 0.0

questions:
  coverage:
    description: "Checks that essential information is present"
    questions:
      - id: C1
        weight: 1.0
        question: "Does CLAUDE.md explain what this project does in 2-3 sentences?"
        failing_indicator: "No project overview, or it is vague"
        passing_indicator: "Clear statement of purpose, audience, and deployment target"

      - id: C2
        weight: 1.0
        question: "Are the primary tech stack and versions documented?"
        failing_indicator: "No version numbers, or stack listed without context"
        passing_indicator: "Table or list with framework and version for each layer"

      - id: C3
        weight: 1.0
        question: "Are coding standards specific enough to be actionable?"
        failing_indicator: "Rules like 'write clean code' or 'follow best practices'"
        passing_indicator: "Rules like 'use zod for external input', 'no default exports'"

      - id: C4
        weight: 1.0
        question: "Are deployment environments and commands documented?"
        failing_indicator: "No deployment section, or just 'deploy to production'"
        passing_indicator: "Environments listed, deploy commands specified"

      - id: C5
        weight: 1.0
        question: "Are there explicit anti-patterns?"
        failing_indicator: "No negative rules at all"
        passing_indicator: "At least 3 explicit prohibitions with reasons"

  quality:
    description: "Checks that rules are clear, non-redundant, and manageable"
    questions:
      - id: Q1
        weight: 1.0
        question: "Can each rule be followed without reading the rest of the file?"
        failing_indicator: "Rules like 'follow the patterns established earlier'"
        passing_indicator: "Each rule is self-contained and unambiguous"

      - id: Q2
        weight: 1.0
        question: "Are there fewer than 150 total rules or instructions?"
        failing_indicator: "More than 150 bullet points or numbered items"
        passing_indicator: "Compact set that fits in working memory"

      - id: Q3
        weight: 1.0
        question: "Does the file have fewer than 500 lines?"
        failing_indicator: "File exceeds 500 lines"
        passing_indicator: "Under 500 lines, or split into imported modules"

      - id: Q4
        weight: 1.0
        question: "Are rules specific and measurable rather than vague?"
        failing_indicator: "Rules that require judgment"
        passing_indicator: "Rules that produce consistent output across prompts"

      - id: Q5
        weight: 1.0
        question: "Does each rule appear only once?"
        failing_indicator: "Same constraint expressed in multiple ways"
        passing_indicator: "No redundancy"

  adherence:
    description: "Behavioral checks that require reviewing actual Claude outputs"
    questions:
      - id: A1
        weight: 1.0
        question: "Do Claude outputs consistently follow the stated coding standards?"
        how_to_check: "Ask Claude to write a new function and compare the result to the standards"
        failing_indicator: "Claude uses patterns explicitly prohibited in CLAUDE.md"
        passing_indicator: "Outputs match stated standards without prompting"

      - id: A2
        weight: 1.0
        question: "Does Claude correctly use the specified libraries and avoid alternatives?"
        how_to_check: "Ask Claude to add input validation"
        failing_indicator: "Claude suggests alternatives that were explicitly excluded"
        passing_indicator: "Claude reaches for the specified tools automatically"

      - id: A3
        weight: 1.0
        question: "Does Claude follow git conventions when generating commits or PRs?"
        how_to_check: "Ask Claude to write a commit message"
        failing_indicator: "Wrong format, missing prefix, wrong capitalization"
        passing_indicator: "Commits match the conventional format exactly"

      - id: A4
        weight: 1.0
        question: "Does Claude avoid the listed anti-patterns?"
        how_to_check: "Introduce a scenario where the anti-pattern would be tempting"
        failing_indicator: "Claude suggests a prohibited pattern without flagging it"
        passing_indicator: "Claude avoids the pattern or explains why it is excluded"

      - id: A5
        weight: 1.0
        question: "When given ambiguous instructions, does Claude make the right default choice?"
        how_to_check: "Give a vague task and see what Claude picks"
        failing_indicator: "Claude invents a default that contradicts the architecture"
        passing_indicator: "Claude's default aligns with documented decisions"

  maintenance:
    description: "Checks that CLAUDE.md stays accurate as the project evolves"
    questions:
      - id: M1
        weight: 1.0
        question: "Was CLAUDE.md updated in the last 90 days?"
        how_to_check: "git log --format='%ar' -- CLAUDE.md | head -1"
        failing_indicator: "Last update more than 90 days ago"
        passing_indicator: "Updated within 90 days, or the project is unchanged"

      - id: M2
        weight: 1.0
        question: "Are there no rules about deprecated technologies still in the file?"
        how_to_check: "Scan for library names and compare with the current stack"
        failing_indicator: "Rules referencing technologies no longer in use"
        passing_indicator: "All rules apply to the current codebase"

      - id: M3
        weight: 1.0
        question: "Do all linked files or imports actually exist?"
        how_to_check: "Run the canary check or verify each reference manually"
        failing_indicator: "Broken paths or links to missing files"
        passing_indicator: "All references resolve to real files"

      - id: M4
        weight: 1.0
        question: "Have team members other than the original author reviewed the file?"
        failing_indicator: "Single author, no review"
        passing_indicator: "At least one other team member has reviewed or edited"

      - id: M5
        weight: 1.0
        question: "Is the file tracked in git with meaningful commit messages?"
        how_to_check: "git log --oneline -- CLAUDE.md"
        failing_indicator: "Not tracked, or every commit is generic"
        passing_indicator: "Tracked with descriptive history"

scoring_guide:
  "18-20": "Excellent - production-grade context"
  "16-17": "Good - minor gaps, address this sprint"
  "13-15": "Needs work - coverage or quality issues"
  "10-12": "Significant issues - frequent corrections likely"
  "0-9": "Critical - rebuild from the skeleton"

